<svg width="320" height="72" viewBox="0 0 320 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Support if you can</title>
  <desc id="desc">A Buy Me a Coffee support button</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="320" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2F2F2"/>
      <stop offset="1" stop-color="#CFCFCF"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="6" y="6" width="308" height="60" rx="18" fill="url(#bg)"/>
    <rect x="7.5" y="7.5" width="305" height="57" rx="16.5" stroke="#111111" stroke-width="3"/>
  </g>

  <circle cx="42" cy="36" r="18" fill="#FFDD00" stroke="#111111" stroke-width="3"/>
  <text x="42" y="43" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#111111">$</text>

  <text x="74" y="33" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="-0.3" fill="#111111">
    Support if you can
  </text>

  <text x="74" y="50" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="0.2" fill="#333333" opacity="0.72">
    buy me a coffee
  </text>

  <path d="M280 28L290 36L280 44" stroke="#111111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
